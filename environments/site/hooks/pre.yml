---

- name: Configure Slurm MPI
  hosts: control
  become: true
  tags: openhpc
  tasks:
    - name: Template mpi.conf
      ansible.builtin.template:
        src: "{{ lookup('env', 'APPLIANCES_ENVIRONMENT_ROOT') }}/../site/templates/mpi.conf.j2"
        dest: /etc/slurm/mpi.conf
        owner: root
        group: root
        mode: 0644

- name: Set up SSSD
  hosts: sssd
  tags: sssd
  become: true
  tasks:
    - name: Copy FreeIPA server cert
      ansible.builtin.copy:
        src: "{{ appliances_environment_root }}/../site/files/dl-auth.acrc.bris.ac.uk.cert"
        dest: "/etc/sssd/dl-auth.acrc.bris.ac.uk.cert"

    - name: "Set SSSD for sudo: remove line"
      ansible.builtin.lineinfile:
        state: absent
        path: /etc/nsswitch.conf
        regexp: '^sudoers:'
    
    - name: "Set SSSD for sudo: insert line"
      ansible.builtin.lineinfile:
        state: present
        path: /etc/nsswitch.conf
        insertafter: EOF
        line: "sudoers: files sss"

# TODO: Remove when upstream patch to sshd role is merged from 2.15
- name: "Hotfix: Set MaxStartups to avoid throttling"
  hosts: control
  tags: sshd
  become: true
  tasks:
    - name: Set MaxStartups
      ansible.builtin.lineinfile:
        state: present
        path: /etc/ssh/sshd_config.d/11-ansible-maxstartups.conf
        create: true
        insertafter: EOF
        line: "MaxStartups 100:30:200"

    - name: Restart sshd service
      ansible.builtin.systemd_service:
        name: sshd
        state: restarted

- name: "Mount data volumes"
  hosts: compute
  tags: data-volumes
  become: true
  tasks:
    - name: "Check if data volume is present"
      ansible.builtin.stat:
        path: /dev/disk/by-path/pci-0000:09:00.0
      register: data_vol_stat

    - name: "Create filesystem on data volume"
      community.general.filesystem:
        fstype: ext4
        dev: /dev/disk/by-path/pci-0000:09:00.0
      when: data_vol_stat.stat.exists

    - name: "Mount filesystem"
      ansible.posix.mount:
        path: /data
        src: /dev/disk/by-path/pci-0000:09:00.0
        state: mounted
        fstype: ext4
      when: data_vol_stat.stat.exists
