openhpc_partitions:
    - name: general
      nodegroups:
        #- general-compute22
        - general-compute23
      partition_params:
        DefaultTime: 15
    - name: rebuild
      nodegroups:
        #- general-compute22
        - general-compute23
      default: NO
      maxtime: 30
      partition_params:
        PriorityJobFactor: 65533
        Hidden: YES
        RootOnly: YES
        DisableRootJobs: NO
        PreemptMode: 'OFF'
        OverSubscribe: EXCLUSIVE
